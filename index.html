<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tulsa Events — Watershed Hospitality</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #F0F2F5;
    --ink: #1A2333;
    --teal: #0D9488;
    --teal-light: #CCFBF1;
    --teal-dark: #0F766E;
    --gold: #C9922A;
    --gold-light: #FEF3C7;
    --blue: #1E3A5F;
    --blue-light: #DBEAFE;
    --steel: #2A6496;
    --steel-light: #E0EAF4;
    --gray-light: #E2E8F0;
    --muted: #64748B;
    --border: rgba(26,35,51,0.12);
    --border-strong: rgba(26,35,51,0.25);
    --shadow: 0 2px 12px rgba(26,35,51,0.08);
    --shadow-lg: 0 8px 32px rgba(26,35,51,0.14);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; overflow-x: hidden; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

  .site-header { background: var(--ink); padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; width: 100%; }
  .site-logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: #F8FAFC; }
  .site-logo span { color: var(--gold); }
  .site-tagline { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 3px; }
  .header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 8px 18px; border-radius: 6px; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-ghost { background: transparent; border: 1px solid rgba(248,250,252,0.25); color: #F8FAFC; }
  .btn-ghost:hover { background: rgba(248,250,252,0.1); }
  .btn-ghost-dark { background: transparent; border: 1px solid var(--border-strong); color: var(--ink); }
  .btn-ghost-dark:hover { background: white; }
  .btn-teal { background: var(--teal); color: white; }
  .btn-teal:hover { background: var(--teal-dark); }
  .btn-teal:disabled { opacity: 0.55; cursor: default; }
  .btn-gold { background: var(--gold); color: var(--ink); }
  .btn-gold:hover { background: #B07E20; }
  .btn-danger { background: transparent; border: 1px solid #DC2626; color: #DC2626; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 7px 14px; border-radius: 6px; cursor: pointer; }
  .btn-danger:hover { background: #FEF2F2; }

  .controls { background: white; border-bottom: 1px solid var(--border); padding: 0.875rem 2rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; position: sticky; top: 0; z-index: 50; box-shadow: var(--shadow); width: 100%; }
  .month-nav { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .nav-arrow { width: 32px; height: 32px; border: 1px solid var(--border-strong); border-radius: 6px; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--ink); transition: all 0.15s; }
  .nav-arrow:hover { background: var(--cream); }
  .month-display { font-family: 'DM Serif Display', serif; font-size: 20px; min-width: 160px; text-align: center; color: var(--ink); }
  .today-btn { font-family: 'DM Sans', sans-serif; font-size: 11px; padding: 5px 12px; border: 1px solid var(--border-strong); border-radius: 6px; background: transparent; cursor: pointer; color: var(--muted); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
  .today-btn:hover { background: var(--cream); color: var(--ink); }

  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
  .chip { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border-strong); background: transparent; cursor: pointer; color: var(--muted); transition: all 0.15s; }
  .chip:hover { border-color: var(--ink); color: var(--ink); }
  .chip.active-all    { background: var(--ink);   color: white;      border-color: var(--ink); }
  .chip.active-arts   { background: var(--teal);  color: white;      border-color: var(--teal); }
  .chip.active-sports { background: var(--steel); color: white;      border-color: var(--steel); }
  .chip.active-conv   { background: var(--blue);  color: white;      border-color: var(--blue); }
  .chip.active-food   { background: var(--gold);  color: var(--ink); border-color: var(--gold); }
  .chip.active-mine   { background: var(--gold);  color: var(--ink); border-color: var(--gold); }

  .cal-outer { width: 100%; padding: 1.5rem 2rem 2rem; }
  .cal-inner { max-width: 1400px; margin: 0 auto; width: 100%; }
  .day-labels { display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap: 4px; margin-bottom: 6px; }
  .day-label { text-align: center; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 4px 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap: 4px; }

  .day-cell { background: white; border: 1px solid var(--border); border-radius: 8px; min-height: 110px; padding: 8px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; overflow: hidden; }
  .day-cell:hover { border-color: var(--border-strong); box-shadow: var(--shadow); }
  .day-cell.other-month { background: rgba(240,242,245,0.7); opacity: 0.55; }
  .day-cell.is-today { border-color: var(--teal); border-width: 2px; }
  .day-cell.is-weekend { background: #F8FAFC; }
  .day-cell.high-traffic { border-color: var(--gold); background: #FFFDF5; }

  .day-num { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; display: flex; align-items: center; justify-content: space-between; }
  .num-inner { background: var(--teal); color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; }
  .traffic-dot { font-size: 9px; font-weight: 700; color: var(--gold); text-transform: uppercase; }

  .evt-pill { font-size: 10px; font-weight: 500; padding: 3px 6px; border-radius: 4px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; display: block; line-height: 1.4; transition: opacity 0.1s; }
  .evt-pill:hover { opacity: 0.75; }
  .pill-mine      { background: var(--gold-light);  color: #92400E; }
  .pill-food      { background: var(--gold-light);  color: #92400E; }
  .pill-arts      { background: var(--teal-light);  color: var(--teal-dark); }
  .pill-sports    { background: var(--steel-light); color: var(--steel); }
  .pill-conv      { background: var(--blue-light);  color: var(--blue); }
  .pill-community { background: var(--gray-light);  color: #334155; }
  .more-link { font-size: 10px; color: var(--teal); font-weight: 600; cursor: pointer; padding: 1px 4px; }
  .more-link:hover { text-decoration: underline; }

  .day-modal-box { background: white; border-radius: 12px; width: 500px; max-width: 100%; max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow-lg); border: 1px solid var(--border); }
  .day-modal-head { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--ink); border-radius: 12px 12px 0 0; position: sticky; top: 0; }
  .day-modal-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: white; }
  .day-evt-list { padding: 0.75rem 1rem; }
  .day-evt-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 8px; border-bottom: 1px solid var(--border); cursor: pointer; border-radius: 6px; transition: background 0.1s; }
  .day-evt-row:hover { background: var(--cream); }
  .day-evt-row:last-child { border-bottom: none; }
  .day-evt-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; margin-top: 4px; }
  .day-evt-info { flex: 1; min-width: 0; }
  .day-evt-name { font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .day-evt-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .status-bar { background: white; border-top: 1px solid var(--border); padding: 0.625rem 2rem; display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--muted); min-height: 38px; width: 100%; flex-wrap: wrap; position: sticky; bottom: 0; }
  .spinner { width: 13px; height: 13px; border: 2px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .source-tally { display: flex; gap: 10px; margin-left: auto; flex-wrap: wrap; }
  .tally-item { font-size: 11px; font-weight: 500; display: flex; align-items: center; gap: 4px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(26,35,51,0.55); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 1rem; }
  .modal-box { background: white; border-radius: 12px; width: 460px; max-width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); border: 1px solid var(--border); }
  .modal-head { padding: 1.25rem 1.5rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--ink); border-radius: 12px 12px 0 0; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: white; }
  .modal-close { width: 30px; height: 30px; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; background: transparent; cursor: pointer; font-size: 16px; color: rgba(255,255,255,0.7); display: flex; align-items: center; justify-content: center; }
  .modal-close:hover { background: rgba(255,255,255,0.1); color: white; }
  .modal-body { padding: 1.25rem 1.5rem; }
  .modal-foot { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; align-items: center; }

  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
  .field input, .field select, .field textarea { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 9px 12px; border: 1px solid var(--border-strong); border-radius: 6px; background: var(--cream); color: var(--ink); outline: none; transition: border-color 0.15s; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--teal); background: white; }
  .field textarea { min-height: 80px; resize: vertical; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .detail-tag { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; margin-bottom: 4px; }
  .source-badge { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; margin-left: 6px; vertical-align: middle; }
  .badge-eb   { background: #FF6A3C; color: white; }
  .badge-tm   { background: #026CDF; color: white; }
  .badge-phq  { background: var(--blue); color: white; }
  .badge-ai   { background: var(--teal); color: white; }
  .badge-mine { background: var(--gold); color: var(--ink); }
  .detail-title { font-family: 'DM Serif Display', serif; font-size: 22px; line-height: 1.2; margin-bottom: 8px; margin-top: 6px; color: var(--ink); }
  .detail-meta { font-size: 13px; color: var(--muted); margin-bottom: 6px; display: flex; align-items: flex-start; gap: 7px; }
  .detail-meta svg { flex-shrink: 0; margin-top: 1px; }
  .detail-notes { font-size: 14px; line-height: 1.6; margin-top: 14px; color: var(--ink); border-top: 1px solid var(--border); padding-top: 14px; }
  .detail-link { display: inline-block; margin-top: 12px; font-size: 13px; font-weight: 500; color: var(--teal); text-decoration: none; }
  .detail-link:hover { text-decoration: underline; }
  .traffic-banner { background: var(--gold-light); border: 1px solid rgba(201,146,42,0.3); border-radius: 6px; padding: 8px 12px; margin-bottom: 12px; font-size: 12px; color: #92400E; font-weight: 500; display: flex; align-items: center; gap: 6px; }

  .sync-badge { font-size: 11px; color: var(--teal); font-weight: 500; display: flex; align-items: center; gap: 4px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); }

  @media (max-width: 768px) {
    .site-header, .controls, .cal-outer, .status-bar { padding-left: 1rem; padding-right: 1rem; }
    .day-cell { min-height: 70px; padding: 5px; }
    .source-tally { display: none; }
  }
</style>
</head>
<body>
<header class="site-header">
  <div>
    <div class="site-logo">Watershed <span>Hospitality</span></div>
    <div class="site-tagline">Tulsa Events &amp; Traffic Calendar</div>
  </div>
  <div class="header-actions">
    <div class="sync-badge" id="syncBadge" style="display:none"><div class="sync-dot"></div>Live sync</div>
    <button class="btn btn-ghost" onclick="openAddModal()">+ Add Event</button>
    <button class="btn btn-teal" id="fetchBtn" onclick="fetchAllEvents()">&#8595; Fetch Events</button>
  </div>
</header>

<div class="controls">
  <div class="month-nav">
    <button class="nav-arrow" onclick="changeMonth(-1)">&#8249;</button>
    <div class="month-display" id="monthDisplay"></div>
    <button class="nav-arrow" onclick="changeMonth(1)">&#8250;</button>
    <button class="today-btn" onclick="goToday()">Today</button>
  </div>
  <div class="filters">
    <button class="chip active-all" data-f="all"    onclick="setFilter('all',this)">All</button>
    <button class="chip" data-f="arts"   onclick="setFilter('arts',this)">Concerts</button>
    <button class="chip" data-f="sports" onclick="setFilter('sports',this)">Sports</button>
    <button class="chip" data-f="conv"   onclick="setFilter('conv',this)">Conventions</button>
    <button class="chip" data-f="food"   onclick="setFilter('food',this)">Food &amp; Drink</button>
    <button class="chip" data-f="mine"   onclick="setFilter('mine',this)">My Events</button>
  </div>
</div>

<div class="cal-outer">
  <div class="cal-inner">
    <div class="day-labels">
      <div class="day-label">Sun</div><div class="day-label">Mon</div><div class="day-label">Tue</div>
      <div class="day-label">Wed</div><div class="day-label">Thu</div><div class="day-label">Fri</div><div class="day-label">Sat</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<div class="status-bar">
  <div id="spinner" class="spinner" style="display:none"></div>
  <span id="statusMsg">Loading calendar...</span>
  <div class="source-tally">
    <div class="tally-item"><span style="width:8px;height:8px;border-radius:50%;background:#FF6A3C;display:inline-block"></span>&nbsp;EB: <strong id="tallyEB">0</strong></div>
    <div class="tally-item"><span style="width:8px;height:8px;border-radius:50%;background:#026CDF;display:inline-block"></span>&nbsp;TM: <strong id="tallyTM">0</strong></div>
    <div class="tally-item"><span style="width:8px;height:8px;border-radius:50%;background:#1E3A5F;display:inline-block"></span>&nbsp;PHQ: <strong id="tallyPHQ">0</strong></div>
    <div class="tally-item"><span style="width:8px;height:8px;border-radius:50%;background:#0D9488;display:inline-block"></span>&nbsp;AI: <strong id="tallyAI">0</strong></div>
  </div>
</div>

<div class="modal-overlay" id="addModal" style="display:none" onclick="if(event.target===this)closeAddModal()">
  <div class="modal-box">
    <div class="modal-head"><div class="modal-title">Add Event</div><button class="modal-close" onclick="closeAddModal()">&#10005;</button></div>
    <div class="modal-body">
      <div class="field"><label>Event name</label><input type="text" id="addName" placeholder="e.g. BOK Center Private Event" /></div>
      <div class="row2">
        <div class="field"><label>Date</label><input type="date" id="addDate" /></div>
        <div class="field"><label>Time</label><input type="time" id="addTime" /></div>
      </div>
      <div class="field"><label>Category</label>
        <select id="addCat">
          <option value="mine">My Event</option>
          <option value="arts">Concert / Show</option>
          <option value="sports">Sports</option>
          <option value="conv">Convention / Expo</option>
          <option value="food">Food &amp; Drink</option>
        </select>
      </div>
      <div class="field"><label>Venue / Location</label><input type="text" id="addLoc" placeholder="e.g. Cox Convention Center" /></div>
      <div class="field"><label>Estimated attendance</label><input type="text" id="addAtt" placeholder="e.g. 5,000" /></div>
      <div class="field"><label>Notes / Promo ideas</label><textarea id="addNotes" placeholder="Special menu ideas, target demographic, promo opportunities..."></textarea></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost-dark" onclick="closeAddModal()">Cancel</button><button class="btn btn-gold" onclick="saveEvent()">Save Event</button></div>
  </div>
</div>

<div class="modal-overlay" id="dayModal" style="display:none" onclick="if(event.target===this)closeDayModal()">
  <div class="day-modal-box">
    <div class="day-modal-head">
      <div class="day-modal-title" id="dayModalTitle"></div>
      <button class="modal-close" onclick="closeDayModal()">&#10005;</button>
    </div>
    <div class="day-evt-list" id="dayEvtList"></div>
  </div>
</div>

<div class="modal-overlay" id="detailModal" style="display:none" onclick="if(event.target===this)closeDetail()">
  <div class="modal-box">
    <div class="modal-head"><div class="modal-title">Event Details</div><button class="modal-close" onclick="closeDetail()">&#10005;</button></div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-foot" id="detailFoot"></div>
  </div>
</div>

<script>
// ── CONFIG ──
const SB_URL  = 'https://svmwifhftylbidsargft.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2bXdpZmhmdHlsYmlkc2FyZ2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODYwMDAsImV4cCI6MjA5MTE2MjAwMH0.6ZLjZ7ky5PbZRTVohxlfwHh_WQTRigRtp2xzexmt4kg';
const TM_KEY  = 'BlTjhuTQB49rAti4GdPq81YK4CJQGYiH';
const PHQ_KEY = '7HqGagbd1SAyCBn6jGbjzzLSh11L5f1RFwaGmCb6';
const CORS    = 'https://corsproxy.io/?';

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const today  = new Date();
let curYear  = today.getFullYear();
let curMonth = today.getMonth();
let activeFilter = 'all';
let activeDetailId = null;
let events = [];
let tallies = {eb:0,tm:0,phq:0,ai:0};

function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function uid(){return '_'+Math.random().toString(36).slice(2,10);}
function isDupe(n,d){return events.some(e=>e.name.toLowerCase().trim()===n.toLowerCase().trim()&&e.date===d);}

// ── SUPABASE ──
async function sbFetch(path, opts={}) {
  const res = await fetch(SB_URL + path, {
    ...opts,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal',
      ...(opts.headers||{})
    }
  });
  if (!res.ok && res.status !== 204) {
    const err = await res.text();
    throw new Error('Supabase error: ' + err);
  }
  if (res.status === 204) return null;
  return res.json();
}

async function loadFromSupabase() {
  try {
    const data = await sbFetch('/rest/v1/events?select=*&order=date.asc');
    events = data || [];
    document.getElementById('syncBadge').style.display = 'flex';
    return true;
  } catch(e) {
    console.error('Supabase load error:', e);
    return false;
  }
}

async function saveToSupabase(ev) {
  try {
    await sbFetch('/rest/v1/events', {
      method: 'POST',
      body: JSON.stringify(ev)
    });
    return true;
  } catch(e) {
    console.error('Supabase save error:', e);
    return false;
  }
}

async function deleteFromSupabase(id) {
  try {
    await sbFetch('/rest/v1/events?id=eq.' + encodeURIComponent(id), {
      method: 'DELETE'
    });
    return true;
  } catch(e) {
    console.error('Supabase delete error:', e);
    return false;
  }
}

async function saveManyToSupabase(evtArray) {
  if (!evtArray.length) return;
  try {
    await sbFetch('/rest/v1/events', {
      method: 'POST',
      headers: { 'Prefer': 'resolution=ignore-duplicates,return=minimal' },
      body: JSON.stringify(evtArray)
    });
  } catch(e) {
    console.error('Supabase bulk save error:', e);
  }
}

// ── CATEGORY ──
function guessCategory(name,desc,phqCat){
  if(phqCat){const p=phqCat.toLowerCase();if(/concert|music|perform|festival/.test(p))return'arts';if(/sport|game|match|race|marathon/.test(p))return'sports';if(/conference|convention|expo|trade|seminar|academic/.test(p))return'conv';if(/food|drink/.test(p))return'food';}
  const t=(name+' '+(desc||'')).toLowerCase();
  if(/concert|music|band|jazz|blues|rock|country|hip.hop|show|perform|theatre|theater|comedy|standup|art|galler|exhibit|danc|ballet|opera|film|movie/i.test(t))return'arts';
  if(/sport|game|match|tournament|race|run|marathon|5k|drill|thunder|soccer|football|baseball|basket|hockey|tennis|golf|rodeo|championship|playoff/i.test(t))return'sports';
  if(/convention|conf|expo|trade.show|summit|symposium|seminar|congress|gala|awards/i.test(t))return'conv';
  if(/food|dine|dinner|lunch|brunch|culinary|chef|cook|tast|wine|beer|brew|cocktail|restaurant|cafe|bbq|grill|farm.market|farmers/i.test(t))return'food';
  return'community';
}
function pillClass(c){return{mine:'pill-mine',food:'pill-food',arts:'pill-arts',sports:'pill-sports',conv:'pill-conv'}[c]||'pill-community';}
function tagStyle(c){return{mine:'background:#FEF3C7;color:#92400E',food:'background:#FEF3C7;color:#92400E',arts:'background:#CCFBF1;color:#0F766E',sports:'background:#E0EAF4;color:#2A6496',conv:'background:#DBEAFE;color:#1E3A5F'}[c]||'background:#E2E8F0;color:#334155';}
function catLabel(c){return{mine:'My Event',food:'Food & Drink',arts:'Concert / Show',sports:'Sports',conv:'Convention / Expo',community:'Community'}[c]||'Event';}
function srcBadge(s){return{eventbrite:'<span class="source-badge badge-eb">Eventbrite</span>',ticketmaster:'<span class="source-badge badge-tm">Ticketmaster</span>',predicthq:'<span class="source-badge badge-phq">PredictHQ</span>',ai:'<span class="source-badge badge-ai">AI Search</span>'}[s]||'<span class="source-badge badge-mine">My Event</span>';}

// ── FILTER / NAV ──
function setFilter(f,el){activeFilter=f;document.querySelectorAll('.chip').forEach(c=>{c.className='chip';if(c.dataset.f===f)c.classList.add('active-'+f);});renderCal();}
function visibleEvts(ds){return events.filter(e=>{if(e.date!==ds)return false;if(activeFilter==='all')return true;if(activeFilter==='mine')return e.source==='mine';return e.cat===activeFilter;});}
function isHighTraffic(ds){const e=events.filter(x=>x.date===ds);return e.length>=3||e.some(x=>x.attendance>=1000);}
function changeMonth(d){curMonth+=d;if(curMonth>11){curMonth=0;curYear++;}if(curMonth<0){curMonth=11;curYear--;}renderCal();}
function goToday(){curYear=today.getFullYear();curMonth=today.getMonth();renderCal();}

// ── RENDER ──
function renderCal(){
  document.getElementById('monthDisplay').textContent=MONTHS[curMonth]+' '+curYear;
  const grid=document.getElementById('calGrid');grid.innerHTML='';
  const first=new Date(curYear,curMonth,1),last=new Date(curYear,curMonth+1,0),sd=first.getDay(),ts=fmtDate(today);
  for(let i=0;i<sd;i++)grid.appendChild(makeCell(new Date(curYear,curMonth,-sd+i+1),true,ts));
  for(let d=1;d<=last.getDate();d++)grid.appendChild(makeCell(new Date(curYear,curMonth,d),false,ts));
  const r=42-(sd+last.getDate());for(let i=1;i<=r;i++)grid.appendChild(makeCell(new Date(curYear,curMonth+1,i),true,ts));
}
function makeCell(dt,other,ts){
  const ds=fmtDate(dt),evts=visibleEvts(ds),isTd=ds===ts,isWe=dt.getDay()===0||dt.getDay()===6,hiTr=!other&&isHighTraffic(ds);
  const cell=document.createElement('div');
  cell.className='day-cell'+(other?' other-month':'')+(isTd?' is-today':'')+(isWe?' is-weekend':'')+(hiTr?' high-traffic':'');
  cell.onclick=e=>{if(e.target===cell||e.target.classList.contains('day-num')||e.target.classList.contains('num-inner')||e.target.classList.contains('traffic-dot'))openAddModal(ds);};
  const nd=document.createElement('div');nd.className='day-num';
  const ns=document.createElement('span');ns.className=isTd?'num-inner':'';ns.textContent=dt.getDate();nd.appendChild(ns);
  if(hiTr){const dot=document.createElement('span');dot.className='traffic-dot';dot.textContent='busy';nd.appendChild(dot);}
  cell.appendChild(nd);
  evts.slice(0,3).forEach(ev=>{const p=document.createElement('div');p.className='evt-pill '+pillClass(ev.cat);p.textContent=(ev.time?formatTime(ev.time)+' ':'')+ev.name;p.title=ev.name+(ev.loc?' @ '+ev.loc:'');p.onclick=e=>{e.stopPropagation();openDetail(ev.id);};cell.appendChild(p);});
  if(evts.length>3){const m=document.createElement('div');m.className='more-link';m.textContent='+'+(evts.length-3)+' more';m.onclick=e=>{e.stopPropagation();openDayModal(ds);};cell.appendChild(m);}
  return cell;
}

// ── STATUS ──
function setStatus(m,l){document.getElementById('statusMsg').textContent=m;document.getElementById('spinner').style.display=l?'block':'none';}
function updateTallies(){document.getElementById('tallyEB').textContent=tallies.eb;document.getElementById('tallyTM').textContent=tallies.tm;document.getElementById('tallyPHQ').textContent=tallies.phq;document.getElementById('tallyAI').textContent=tallies.ai;}

function closeDayModal(){document.getElementById('dayModal').style.display='none';}
function openDayModal(ds){
  const dateObj=new Date(ds+'T12:00:00');
  const dateStr=dateObj.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const dayEvts=events.filter(e=>e.date===ds);
  document.getElementById('dayModalTitle').textContent=dateStr+' — '+dayEvts.length+' events';
  const dotColors={mine:'#C9922A',food:'#C9922A',arts:'#0D9488',sports:'#2A6496',conv:'#1E3A5F',community:'#64748B'};
  document.getElementById('dayEvtList').innerHTML=dayEvts.length===0?'<p style="padding:1rem;color:var(--muted);font-size:13px">No events this day.</p>':dayEvts.map(ev=>`
    <div class="day-evt-row" onclick="closeDayModal();setTimeout(()=>openDetail('${ev.id}'),100)">
      <div class="day-evt-dot" style="background:${dotColors[ev.cat]||'#64748B'}"></div>
      <div class="day-evt-info">
        <div class="day-evt-name">${ev.name}</div>
        <div class="day-evt-meta">${ev.time?formatTime(ev.time)+' · ':''}${ev.loc||''}${ev.attendance>=100?' · Est. '+Number(ev.attendance).toLocaleString()+' attendees':''}</div>
      </div>
    </div>
  `).join('');
  document.getElementById('dayModal').style.display='flex';
}

// ── ADD MODAL ──
function openAddModal(pre){
  document.getElementById('addName').value='';document.getElementById('addDate').value=pre||fmtDate(today);
  document.getElementById('addTime').value='';document.getElementById('addCat').value='mine';
  document.getElementById('addLoc').value='';document.getElementById('addAtt').value='';document.getElementById('addNotes').value='';
  document.getElementById('addModal').style.display='flex';
}
function closeAddModal(){document.getElementById('addModal').style.display='none';}

async function saveEvent(){
  const name=document.getElementById('addName').value.trim(),date=document.getElementById('addDate').value;
  if(!name||!date){alert('Please enter an event name and date.');return;}
  const att=parseInt(document.getElementById('addAtt').value.replace(/\D/g,''))||0;
  const ev={id:uid(),name,date,time:document.getElementById('addTime').value,cat:document.getElementById('addCat').value,loc:document.getElementById('addLoc').value.trim(),notes:document.getElementById('addNotes').value.trim(),source:'mine',url:'',attendance:att};
  setStatus('Saving event...',true);
  const saved = await saveToSupabase(ev);
  if(saved){events.push(ev);setStatus('Event saved and synced: '+name,false);}
  else{events.push(ev);setStatus('Event saved locally (sync failed)',false);}
  closeAddModal();renderCal();
}

// ── DETAIL MODAL ──
function openDetail(id){
  const ev=events.find(e=>e.id===id);if(!ev)return;activeDetailId=id;
  const dateObj=new Date(ev.date+'T12:00:00');
  const dateStr=dateObj.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const timeStr=ev.time?' · '+formatTime(ev.time):'';
  const allOnDay=events.filter(e=>e.date===ev.date).length;
  const traf=allOnDay>=3?`<div class="traffic-banner">&#9733; High-traffic day — ${allOnDay} events in Tulsa. Consider targeted dining promotions.</div>`:ev.attendance>=1000?`<div class="traffic-banner">&#9733; Est. ${Number(ev.attendance).toLocaleString()} attendees — good opportunity for dining promotions.</div>`:'';
  document.getElementById('detailBody').innerHTML=`${traf}<div style="margin-bottom:6px"><span class="detail-tag" style="${tagStyle(ev.cat)}">${catLabel(ev.cat)}</span>${srcBadge(ev.source)}</div><div class="detail-title">${ev.name}</div><div class="detail-meta"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${dateStr}${timeStr}</div>${ev.loc?`<div class="detail-meta"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 1 7 7c0 5.25-7 13-7 13S5 14.25 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>${ev.loc}</div>`:''}${ev.attendance?`<div class="detail-meta"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>Est. ${Number(ev.attendance).toLocaleString()} attendees</div>`:''}${ev.notes?`<div class="detail-notes">${ev.notes}</div>`:''}${ev.url?`<a href="${ev.url}" target="_blank" class="detail-link">View tickets &#8599;</a>`:''}`;
  const isOwned=ev.source==='mine';
  document.getElementById('detailFoot').innerHTML=isOwned?`<button class="btn-danger" onclick="deleteEvt()">Remove</button><button class="btn btn-ghost-dark" style="margin-left:auto" onclick="closeDetail()">Close</button>`:`<button class="btn btn-ghost-dark" style="margin-left:auto" onclick="closeDetail()">Close</button>`;
  document.getElementById('detailModal').style.display='flex';
}
function closeDetail(){document.getElementById('detailModal').style.display='none';activeDetailId=null;}
async function deleteEvt(){
  if(!activeDetailId)return;
  await deleteFromSupabase(activeDetailId);
  events=events.filter(e=>e.id!==activeDetailId);
  closeDetail();renderCal();
  setStatus('Event removed.',false);
}
function formatTime(t){if(!t)return'';const[h,m]=t.split(':').map(Number);return(h%12||12)+':'+String(m).padStart(2,'0')+' '+(h>=12?'PM':'AM');}

// ── API FETCHERS ──
async function fetchTicketmaster(){
  const s=new Date(curYear,curMonth,1).toISOString().slice(0,19)+'Z',e=new Date(curYear,curMonth+1,0,23,59).toISOString().slice(0,19)+'Z';
  const res=await fetch(CORS+encodeURIComponent(`https://app.ticketmaster.com/discovery/v2/events.json?city=Tulsa&stateCode=OK&startDateTime=${s}&endDateTime=${e}&size=50&apikey=${TM_KEY}`));
  const data=await res.json();const evts=data._embedded?.events;if(!evts)return[];
  return evts.filter(ev=>{const date=ev.dates?.start?.localDate;return date&&!isDupe(ev.name,date);}).map(ev=>{
    const date=ev.dates.start.localDate,time=ev.dates.start.localTime?.slice(0,5)||'';
    const venue=ev._embedded?.venues?.[0];const loc=venue?venue.name+(venue.city?.name?', '+venue.city.name:''):'Tulsa, OK';
    return{id:uid(),name:ev.name,date,time,cat:guessCategory(ev.name,'',ev.classifications?.[0]?.segment?.name||''),loc,notes:'',source:'ticketmaster',url:ev.url||'',attendance:5000};
  });
}

async function fetchPredictHQ(){
  const s=new Date(curYear,curMonth,1).toISOString().slice(0,10),e=new Date(curYear,curMonth+1,0).toISOString().slice(0,10);
  const res=await fetch(CORS+encodeURIComponent(`https://api.predicthq.com/v1/events/?country=US&location_around.origin=36.1540,-95.9928&location_around.offset=30mi&start.gte=${s}&start.lte=${e}&limit=100&category=concerts,conferences,expos,festivals,performing-arts,sports,community,observances`),{headers:{'Authorization':'Bearer '+PHQ_KEY,'Accept':'application/json'}});
  const data=await res.json();if(!data.results)return[];
  return data.results.filter(ev=>ev.start?.slice(0,10)&&!isDupe(ev.title,ev.start.slice(0,10))).map(ev=>{
    const date=ev.start.slice(0,10),time=ev.start.slice(11,16)||'';
    const loc=ev.entities?.find(e=>e.type==='venue')?.name||'Tulsa, OK';
    return{id:uid(),name:ev.title,date,time,cat:guessCategory(ev.title,ev.description,ev.category),loc,notes:ev.description?.slice(0,300)||'',source:'predicthq',url:'',attendance:ev.phq_attendance||0};
  });
}

async function fetchAIEvents(){
  const prompt=`Search for upcoming events in Tulsa, Oklahoma in ${MONTHS[curMonth]} ${curYear} that bring large crowds. Focus on: Cox Convention Center events, trade shows, consumer expos, University of Tulsa events, OSU-Tulsa events, rodeos, air shows, state championship tournaments, major festivals. Return ONLY a valid JSON array (no markdown): [{"name":"...","date":"${curYear}-${String(curMonth+1).padStart(2,'0')}-DD","time":"HH:MM","cat":"arts|sports|conv|food|community","loc":"venue","notes":"brief description","attendance":5000}]. Only return the JSON array.`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:prompt}]})});
  const data=await res.json();const raw=data.content?.find(b=>b.type==='text')?.text||'';
  const match=raw.match(/\[[\s\S]*?\]/);if(!match)return[];
  let parsed=[];try{parsed=JSON.parse(match[0]);}catch{return[];}
  return parsed.filter(ev=>ev.name&&ev.date&&!isDupe(ev.name,ev.date)).map(ev=>({id:uid(),name:ev.name,date:ev.date,time:ev.time||'',cat:ev.cat||'community',loc:ev.loc||'Tulsa, OK',notes:ev.notes||'',source:'ai',url:'',attendance:ev.attendance||0}));
}

// ── FETCH ALL ──
async function fetchAllEvents(){
  const btn=document.getElementById('fetchBtn');btn.disabled=true;btn.textContent='Fetching...';
  tallies={eb:0,tm:0,phq:0,ai:0};updateTallies();
  let allNew=[];

  setStatus('Fetching Ticketmaster events...',true);
  try{const r=await fetchTicketmaster();allNew.push(...r);tallies.tm=r.length;}catch(e){console.error(e);}updateTallies();

  setStatus('Fetching PredictHQ events...',true);
  try{const r=await fetchPredictHQ();allNew.push(...r);tallies.phq=r.length;}catch(e){console.error(e);}updateTallies();

  setStatus('Running AI search for conventions & additional events...',true);
  try{const r=await fetchAIEvents();allNew.push(...r);tallies.ai=r.length;}catch(e){console.error(e);}updateTallies();

  if(allNew.length){
    setStatus('Saving '+allNew.length+' events to shared database...',true);
    await saveManyToSupabase(allNew);
    events.push(...allNew);
  }

  renderCal();btn.disabled=false;btn.textContent='↓ Fetch Events';
  const total=tallies.eb+tallies.tm+tallies.phq+tallies.ai;
  setStatus(total>0?`Loaded ${total} new events for ${MONTHS[curMonth]} ${curYear} — synced to shared calendar`:'No new events found — try another month or add events manually.',false);
}

// ── INIT ──
async function init(){
  renderCal();
  setStatus('Loading shared calendar...',true);
  const loaded = await loadFromSupabase();
  if(loaded){
    renderCal();
    const count=events.length;
    setStatus(count>0?`Loaded ${count} events from shared calendar — click "Fetch Events" to refresh`:'Shared calendar is empty — click "Fetch Events" to load Tulsa events.',false);
  } else {
    setStatus('Could not connect to shared database. Click "Fetch Events" to try loading events.',false);
  }
}

init();
</script>
