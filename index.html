<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tulsa Events — Watershed Hospitality</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
 :root {
    --cream: #F0F2F5;
    --ink: #1A2333;
    --rust: #0D9488;
    --rust-light: #CCFBF1;
    --rust-dark: #0F766E;
    --gold: #C9922A;
    --gold-light: #FEF3C7;
    --sage: #2A6496;
    --sage-light: #DBEAFE;
    --blue: #1E3A5F;
    --blue-light: #DBEAFE;
    --purple: #0D9488;
    --purple-light: #CCFBF1;
    --muted: #64748B;
    --border: rgba(26,35,51,0.12);
    --border-strong: rgba(26,35,51,0.25);
    --shadow: 0 2px 12px rgba(26,22,18,0.08);
    --shadow-lg: 0 8px 32px rgba(26,22,18,0.14);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

  .site-header {
    background: var(--ink);
    padding: 1.25rem 2rem;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  }
  .site-logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--cream); letter-spacing: -0.01em; }
  .site-logo span { color: var(--gold); }
  .site-tagline { font-size: 12px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px; }
  .header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 8px 18px; border-radius: 6px; cursor: pointer; border: none; transition: all 0.15s; letter-spacing: 0.01em; }
  .btn-ghost { background: transparent; border: 1px solid rgba(245,240,232,0.25); color: var(--cream); }
  .btn-ghost:hover { background: rgba(245,240,232,0.1); }
  .btn-ghost-dark { background: transparent; border: 1px solid var(--border-strong); color: var(--ink); }
  .btn-ghost-dark:hover { background: var(--cream); }
  .btn-primary { background: var(--rust); color: var(--cream); }
  .btn-primary:hover { background: var(--rust-dark); }
  .btn-primary:disabled { opacity: 0.55; cursor: default; }
  .btn-gold { background: var(--gold); color: var(--ink); }
  .btn-gold:hover { background: #B07E20; }
  .btn-danger { background: transparent; border: 1px solid #C0392B; color: #C0392B; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 7px 14px; border-radius: 6px; cursor: pointer; }
  .btn-danger:hover { background: #FDECEA; }

  .controls {
    background: white; border-bottom: 1px solid var(--border);
    padding: 0.875rem 2rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 50; box-shadow: var(--shadow);
  }
  .month-nav { display: flex; align-items: center; gap: 10px; }
  .nav-arrow { width: 32px; height: 32px; border: 1px solid var(--border-strong); border-radius: 6px; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--ink); transition: all 0.15s; }
  .nav-arrow:hover { background: var(--cream); }
  .month-display { font-family: 'DM Serif Display', serif; font-size: 20px; min-width: 180px; text-align: center; }
  .today-btn { font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 5px 12px; border: 1px solid var(--border-strong); border-radius: 6px; background: transparent; cursor: pointer; color: var(--muted); font-weight: 500; letter-spacing: 0.02em; text-transform: uppercase; }
  .today-btn:hover { background: var(--cream); color: var(--ink); }

  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
  .chip { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border-strong); background: transparent; cursor: pointer; color: var(--muted); transition: all 0.15s; letter-spacing: 0.02em; }
  .chip:hover { border-color: var(--ink); color: var(--ink); }
  .chip.active-all     { background: var(--ink);    color: var(--cream);  border-color: var(--ink); }
  .chip.active-food    { background: var(--rust);   color: var(--cream);  border-color: var(--rust); }
  .chip.active-arts    { background: var(--blue);   color: var(--cream);  border-color: var(--blue); }
  .chip.active-sports  { background: var(--sage);   color: var(--cream);  border-color: var(--sage); }
  .chip.active-conv    { background: var(--purple); color: var(--cream);  border-color: var(--purple); }
  .chip.active-mine    { background: var(--gold);   color: var(--ink);    border-color: var(--gold); }

  .cal-wrap { padding: 1.5rem 2rem 2rem; max-width: 1200px; margin: 0 auto; }
  .day-labels { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px; }
  .day-label { text-align: center; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 4px 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }

  .day-cell { background: white; border: 1px solid var(--border); border-radius: 8px; min-height: 110px; padding: 8px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
  .day-cell:hover { border-color: var(--border-strong); box-shadow: var(--shadow); }
  .day-cell.other-month { background: rgba(245,240,232,0.5); opacity: 0.6; }
  .day-cell.is-today { border-color: var(--rust); border-width: 2px; }
  .day-cell.is-weekend { background: #FDFBF7; }
  .day-cell.high-traffic { border-color: var(--gold); background: #FFFDF7; }

  .day-num { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; display: flex; align-items: center; justify-content: space-between; }
  .day-cell.is-today .num-inner { background: var(--rust); color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; }
  .traffic-dot { font-size: 9px; font-weight: 700; letter-spacing: 0.03em; color: var(--gold); text-transform: uppercase; }

  .evt-pill { font-size: 10px; font-weight: 500; padding: 3px 7px; border-radius: 4px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; transition: opacity 0.1s; display: block; line-height: 1.4; }
  .evt-pill:hover { opacity: 0.8; }
  .pill-mine      { background: var(--gold-light);   color: #7A5510; }
  .pill-food      { background: var(--rust-light);   color: var(--rust-dark); }
  .pill-arts      { background: var(--blue-light);   color: var(--blue); }
  .pill-sports    { background: var(--sage-light);   color: var(--sage); }
  .pill-conv      { background: var(--purple-light); color: var(--purple); }
  .pill-community { background: #EDE8E0;             color: #4A3F35; }
  .more-link { font-size: 10px; color: var(--muted); font-weight: 500; cursor: pointer; padding: 1px 4px; }
  .more-link:hover { color: var(--ink); }

  /* source pills in day cells */
  .src-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; margin-right: 3px; vertical-align: middle; flex-shrink: 0; }

  .status-bar { background: white; border-top: 1px solid var(--border); padding: 0.625rem 2rem; display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--muted); min-height: 38px; position: sticky; bottom: 0; flex-wrap: wrap; }
  .spinner { width: 13px; height: 13px; border: 2px solid var(--border); border-top-color: var(--rust); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .source-tally { display: flex; gap: 10px; margin-left: auto; flex-wrap: wrap; }
  .tally-item { font-size: 11px; font-weight: 500; display: flex; align-items: center; gap: 4px; }

  .legend { display: flex; gap: 14px; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); font-weight: 500; }
  .leg-dot { width: 9px; height: 9px; border-radius: 3px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(26,22,18,0.5); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 1rem; }
  .modal-box { background: var(--cream); border-radius: 12px; width: 460px; max-width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); border: 1px solid var(--border); }
  .modal-head { padding: 1.25rem 1.5rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 20px; }
  .modal-close { width: 30px; height: 30px; border: 1px solid var(--border-strong); border-radius: 6px; background: transparent; cursor: pointer; font-size: 16px; color: var(--muted); display: flex; align-items: center; justify-content: center; }
  .modal-close:hover { background: white; color: var(--ink); }
  .modal-body { padding: 1.25rem 1.5rem; }
  .modal-foot { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; align-items: center; }

  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
  .field input, .field select, .field textarea { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 9px 12px; border: 1px solid var(--border-strong); border-radius: 6px; background: white; color: var(--ink); outline: none; transition: border-color 0.15s; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--rust); }
  .field textarea { min-height: 80px; resize: vertical; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .detail-tag { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; margin-bottom: 4px; }
  .source-badge { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; margin-left: 6px; vertical-align: middle; }
  .badge-eb  { background: #FF6A3C; color: white; }
  .badge-tm  { background: #026CDF; color: white; }
  .badge-phq { background: #5A3E8A; color: white; }
  .badge-ai  { background: #2A7A5A; color: white; }
  .badge-mine { background: var(--gold); color: var(--ink); }

  .detail-title { font-family: 'DM Serif Display', serif; font-size: 22px; line-height: 1.2; margin-bottom: 8px; margin-top: 6px; }
  .detail-meta { font-size: 13px; color: var(--muted); margin-bottom: 5px; display: flex; align-items: flex-start; gap: 7px; }
  .detail-meta svg { flex-shrink: 0; margin-top: 1px; }
  .detail-notes { font-size: 14px; line-height: 1.6; margin-top: 14px; color: var(--ink); border-top: 1px solid var(--border); padding-top: 14px; }
  .detail-link { display: inline-block; margin-top: 12px; font-size: 13px; font-weight: 500; color: var(--rust); text-decoration: none; }
  .detail-link:hover { text-decoration: underline; }

  .traffic-banner { background: var(--gold-light); border: 1px solid rgba(201,146,42,0.3); border-radius: 6px; padding: 8px 12px; margin-bottom: 12px; font-size: 12px; color: #7A5510; font-weight: 500; display: flex; align-items: center; gap: 6px; }

  @media (max-width: 640px) {
    .controls { padding: 0.75rem 1rem; }
    .cal-wrap { padding: 1rem; }
    .site-header { padding: 1rem; }
    .status-bar { padding: 0.5rem 1rem; }
    .day-cell { min-height: 70px; }
    .source-tally, .legend { display: none; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div>
    <div class="site-logo">Watershed <span>Hospitality</span></div>
    <div class="site-tagline">Tulsa Events &amp; Traffic Calendar</div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="openAddModal()">+ Add Event</button>
    <button class="btn btn-primary" id="fetchBtn" onclick="fetchAllEvents()">&#8595; Fetch Events</button>
  </div>
</header>

<div class="controls">
  <div class="month-nav">
    <button class="nav-arrow" onclick="changeMonth(-1)">&#8249;</button>
    <div class="month-display" id="monthDisplay"></div>
    <button class="nav-arrow" onclick="changeMonth(1)">&#8250;</button>
    <button class="today-btn" onclick="goToday()">Today</button>
  </div>
  <div class="filters">
    <button class="chip active-all" data-f="all"    onclick="setFilter('all',this)">All</button>
    <button class="chip" data-f="arts"   onclick="setFilter('arts',this)">Concerts</button>
    <button class="chip" data-f="sports" onclick="setFilter('sports',this)">Sports</button>
    <button class="chip" data-f="conv"   onclick="setFilter('conv',this)">Conventions</button>
    <button class="chip" data-f="food"   onclick="setFilter('food',this)">Food &amp; Drink</button>
    <button class="chip" data-f="mine"   onclick="setFilter('mine',this)">My Events</button>
  </div>
</div>

<div class="cal-wrap">
  <div class="day-labels">
    <div class="day-label">Sun</div><div class="day-label">Mon</div><div class="day-label">Tue</div>
    <div class="day-label">Wed</div><div class="day-label">Thu</div><div class="day-label">Fri</div><div class="day-label">Sat</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<div class="status-bar">
  <div id="spinner" class="spinner" style="display:none"></div>
  <span id="statusMsg">Ready — click "Fetch Events" to load Eventbrite, Ticketmaster &amp; PredictHQ events for Tulsa.</span>
  <div class="source-tally">
    <div class="tally-item"><span style="width:8px;height:8px;border-radius:50%;background:#FF6A3C;display:inline-block"></span> EB: <strong id="tallyEB">0</strong></div>
    <div class="tally-item"><span style="width:8px;height:8px;border-radius:50%;background:#026CDF;display:inline-block"></span> TM: <strong id="tallyTM">0</strong></div>
    <div class="tally-item"><span style="width:8px;height:8px;border-radius:50%;background:#5A3E8A;display:inline-block"></span> PHQ: <strong id="tallyPHQ">0</strong></div>
    <div class="tally-item"><span style="width:8px;height:8px;border-radius:50%;background:#2A7A5A;display:inline-block"></span> AI: <strong id="tallyAI">0</strong></div>
  </div>
</div>

<!-- ADD EVENT MODAL -->
<div class="modal-overlay" id="addModal" style="display:none" onclick="if(event.target===this)closeAddModal()">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title">Add Event</div>
      <button class="modal-close" onclick="closeAddModal()">&#10005;</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Event name</label><input type="text" id="addName" placeholder="e.g. BOK Center Private Event" /></div>
      <div class="row2">
        <div class="field"><label>Date</label><input type="date" id="addDate" /></div>
        <div class="field"><label>Time</label><input type="time" id="addTime" /></div>
      </div>
      <div class="field">
        <label>Category</label>
        <select id="addCat">
          <option value="mine">My Event</option>
          <option value="arts">Concert / Show</option>
          <option value="sports">Sports</option>
          <option value="conv">Convention / Expo</option>
          <option value="food">Food &amp; Drink</option>
        </select>
      </div>
      <div class="field"><label>Venue / Location</label><input type="text" id="addLoc" placeholder="e.g. Cox Convention Center" /></div>
      <div class="field"><label>Estimated attendance</label><input type="text" id="addAtt" placeholder="e.g. 5,000 attendees" /></div>
      <div class="field"><label>Notes / Promo ideas</label><textarea id="addNotes" placeholder="Special menu, promo ideas, target demographic..."></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost-dark" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-gold" onclick="saveEvent()">Save Event</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal" style="display:none" onclick="if(event.target===this)closeDetail()">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title">Event Details</div>
      <button class="modal-close" onclick="closeDetail()">&#10005;</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-foot" id="detailFoot"></div>
  </div>
</div>

<script>
// ── API KEYS ──
const EB_KEY  = 'MWSGIEOMO6J3JR5CHZ6G';
const TM_KEY  = 'BlTjhuTQB49rAti4GdPq81YK4CJQGYiH';
const PHQ_KEY = '7HqGagbd1SAyCBn6jGbjzzLSh11L5f1RFwaGmCb6';
const CORS    = 'https://corsproxy.io/?';

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const today  = new Date();
let curYear  = today.getFullYear();
let curMonth = today.getMonth();
let activeFilter   = 'all';
let activeDetailId = null;
let events = [];
let tallies = { eb: 0, tm: 0, phq: 0, ai: 0 };

function fmtDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function uid() { return '_' + Math.random().toString(36).slice(2,10); }

// ── CATEGORY ──
function guessCategory(name, desc, phqCat) {
  if (phqCat) {
    const p = phqCat.toLowerCase();
    if (p.includes('concert') || p.includes('music') || p.includes('perform') || p.includes('festival')) return 'arts';
    if (p.includes('sport') || p.includes('game') || p.includes('match') || p.includes('race') || p.includes('marathon')) return 'sports';
    if (p.includes('conference') || p.includes('convention') || p.includes('expo') || p.includes('trade-show') || p.includes('seminar') || p.includes('academic')) return 'conv';
    if (p.includes('food') || p.includes('drink') || p.includes('festival') || p.includes('fair')) return 'food';
  }
  const txt = (name + ' ' + (desc||'')).toLowerCase();
  if (/concert|music|band|jazz|blues|rock|country|hip.hop|show|perform|theatre|theater|comedy|standup|art|galler|exhibit|danc|ballet|opera|film|movie|live.entertain/i.test(txt)) return 'arts';
  if (/sport|game|match|tournament|race|run|marathon|5k|drill|thunder|soccer|football|baseball|basket|hockey|tennis|golf|rodeo|championship|playoffs/i.test(txt)) return 'sports';
  if (/convention|conf(?:erence)?|expo|trade.show|summit|symposium|seminar|congress|gala|awards/i.test(txt)) return 'conv';
  if (/food|dine|dinner|lunch|brunch|eat|culinary|chef|cook|tast|wine|beer|brew|cocktail|bar|restaurant|bistro|cafe|pizza|bbq|grill|farm.market|farmers/i.test(txt)) return 'food';
  return 'community';
}

function pillClass(cat) {
  return { mine:'pill-mine', food:'pill-food', arts:'pill-arts', sports:'pill-sports', conv:'pill-conv' }[cat] || 'pill-community';
}
function tagStyle(cat) {
  const m = {
    mine:  'background:var(--gold-light);color:#7A5510',
    food:  'background:var(--rust-light);color:var(--rust-dark)',
    arts:  'background:var(--blue-light);color:var(--blue)',
    sports:'background:var(--sage-light);color:var(--sage)',
    conv:  'background:var(--purple-light);color:var(--purple)',
  };
  return m[cat] || 'background:#EDE8E0;color:#4A3F35';
}
function catLabel(cat) {
  return { mine:'My Event', food:'Food & Drink', arts:'Concert / Show', sports:'Sports', conv:'Convention / Expo', community:'Community' }[cat] || 'Event';
}
function sourceBadgeHTML(src) {
  const m = { eventbrite:'<span class="source-badge badge-eb">Eventbrite</span>', ticketmaster:'<span class="source-badge badge-tm">Ticketmaster</span>', predicthq:'<span class="source-badge badge-phq">PredictHQ</span>', ai:'<span class="source-badge badge-ai">AI Search</span>' };
  return m[src] || '<span class="source-badge badge-mine">My Event</span>';
}

// ── FILTER ──
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c => {
    c.className = 'chip';
    if (c.dataset.f === f) c.classList.add('active-' + f);
  });
  renderCal();
}

function visibleEvts(ds) {
  return events.filter(e => {
    if (e.date !== ds) return false;
    if (activeFilter === 'all') return true;
    if (activeFilter === 'mine') return e.source === 'mine';
    return e.cat === activeFilter;
  });
}

// High traffic = 3+ events or any event with 1000+ attendance
function isHighTraffic(ds) {
  const evts = events.filter(e => e.date === ds);
  if (evts.length >= 3) return true;
  return evts.some(e => e.attendance && e.attendance >= 1000);
}

// ── NAV ──
function changeMonth(d) { curMonth += d; if (curMonth > 11) { curMonth = 0; curYear++; } if (curMonth < 0) { curMonth = 11; curYear--; } renderCal(); }
function goToday() { curYear = today.getFullYear(); curMonth = today.getMonth(); renderCal(); }

// ── RENDER ──
function renderCal() {
  document.getElementById('monthDisplay').textContent = MONTHS[curMonth] + ' ' + curYear;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const first = new Date(curYear, curMonth, 1);
  const last  = new Date(curYear, curMonth+1, 0);
  const startDay = first.getDay();
  const todayStr = fmtDate(today);

  for (let i = 0; i < startDay; i++) grid.appendChild(makeCell(new Date(curYear, curMonth, -startDay+i+1), true, todayStr));
  for (let d = 1; d <= last.getDate(); d++) grid.appendChild(makeCell(new Date(curYear, curMonth, d), false, todayStr));
  const rem = 42 - (startDay + last.getDate());
  for (let i = 1; i <= rem; i++) grid.appendChild(makeCell(new Date(curYear, curMonth+1, i), true, todayStr));
}

function makeCell(dt, other, todayStr) {
  const ds   = fmtDate(dt);
  const evts = visibleEvts(ds);
  const isTd = ds === todayStr;
  const isWe = dt.getDay() === 0 || dt.getDay() === 6;
  const hiTr = !other && isHighTraffic(ds);

  const cell = document.createElement('div');
  cell.className = 'day-cell' + (other?' other-month':'') + (isTd?' is-today':'') + (isWe?' is-weekend':'') + (hiTr?' high-traffic':'');
  cell.onclick = e => { if (e.target === cell || e.target.classList.contains('day-num') || e.target.classList.contains('num-inner') || e.target.classList.contains('traffic-dot')) openAddModal(ds); };

  const numDiv = document.createElement('div');
  numDiv.className = 'day-num';
  const numSpan = document.createElement('span');
  numSpan.className = isTd ? 'num-inner' : '';
  numSpan.textContent = dt.getDate();
  numDiv.appendChild(numSpan);
  if (hiTr) { const dot = document.createElement('span'); dot.className = 'traffic-dot'; dot.textContent = 'busy'; numDiv.appendChild(dot); }
  cell.appendChild(numDiv);

  const MAX = 3;
  evts.slice(0, MAX).forEach(ev => {
    const pill = document.createElement('div');
    pill.className = 'evt-pill ' + pillClass(ev.cat);
    const t = ev.time ? ev.time.slice(0,5) + ' ' : '';
    pill.textContent = t + ev.name;
    pill.title = ev.name + (ev.loc ? ' @ ' + ev.loc : '');
    pill.onclick = e => { e.stopPropagation(); openDetail(ev.id); };
    cell.appendChild(pill);
  });
  if (evts.length > MAX) {
    const m = document.createElement('div');
    m.className = 'more-link';
    m.textContent = '+' + (evts.length - MAX) + ' more';
    m.onclick = e => { e.stopPropagation(); openDetail(evts[MAX].id); };
    cell.appendChild(m);
  }
  return cell;
}

// ── STATUS ──
function setStatus(msg, loading) {
  document.getElementById('statusMsg').textContent = msg;
  document.getElementById('spinner').style.display = loading ? 'block' : 'none';
}
function updateTallies() {
  document.getElementById('tallyEB').textContent  = tallies.eb;
  document.getElementById('tallyTM').textContent  = tallies.tm;
  document.getElementById('tallyPHQ').textContent = tallies.phq;
  document.getElementById('tallyAI').textContent  = tallies.ai;
}

// ── ADD MODAL ──
function openAddModal(prefill) {
  document.getElementById('addName').value  = '';
  document.getElementById('addDate').value  = prefill || fmtDate(today);
  document.getElementById('addTime').value  = '';
  document.getElementById('addCat').value   = 'mine';
  document.getElementById('addLoc').value   = '';
  document.getElementById('addAtt').value   = '';
  document.getElementById('addNotes').value = '';
  document.getElementById('addModal').style.display = 'flex';
}
function closeAddModal() { document.getElementById('addModal').style.display = 'none'; }

function saveEvent() {
  const name = document.getElementById('addName').value.trim();
  const date = document.getElementById('addDate').value;
  if (!name || !date) { alert('Please enter an event name and date.'); return; }
  const attRaw = document.getElementById('addAtt').value.trim();
  const att = parseInt(attRaw.replace(/\D/g,'')) || 0;
  events.push({ id: uid(), name, date, time: document.getElementById('addTime').value, cat: document.getElementById('addCat').value, loc: document.getElementById('addLoc').value.trim(), notes: document.getElementById('addNotes').value.trim(), source: 'mine', url: '', attendance: att });
  closeAddModal();
  renderCal();
  setStatus('Event added: ' + name, false);
}

// ── DETAIL MODAL ──
function openDetail(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  activeDetailId = id;
  const dateObj = new Date(ev.date + 'T12:00:00');
  const dateStr = dateObj.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  const timeStr = ev.time ? ' · ' + formatTime(ev.time) : '';
  const isOwned = ev.source === 'mine';

  const allOnDay = events.filter(e => e.date === ev.date).length;
  const trafficHTML = allOnDay >= 3
    ? `<div class="traffic-banner">&#9733; High-traffic day — ${allOnDay} events in Tulsa. Consider targeted promotions.</div>`
    : ev.attendance >= 1000
    ? `<div class="traffic-banner">&#9733; Est. ${ev.attendance.toLocaleString()} attendees — good opportunity for dining promotions.</div>`
    : '';

  document.getElementById('detailBody').innerHTML = `
    ${trafficHTML}
    <div>
      <span class="detail-tag" style="${tagStyle(ev.cat)}">${catLabel(ev.cat)}</span>
      ${sourceBadgeHTML(ev.source)}
    </div>
    <div class="detail-title">${ev.name}</div>
    <div class="detail-meta"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${dateStr}${timeStr}</div>
    ${ev.loc ? `<div class="detail-meta"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 1 7 7c0 5.25-7 13-7 13S5 14.25 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>${ev.loc}</div>` : ''}
    ${ev.attendance ? `<div class="detail-meta"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Est. ${Number(ev.attendance).toLocaleString()} attendees</div>` : ''}
    ${ev.notes ? `<div class="detail-notes">${ev.notes}</div>` : ''}
    ${ev.url ? `<a href="${ev.url}" target="_blank" class="detail-link">View tickets &#8599;</a>` : ''}
  `;
  document.getElementById('detailFoot').innerHTML = isOwned
    ? `<button class="btn-danger" onclick="deleteEvt()">Remove</button><button class="btn btn-ghost-dark" style="margin-left:auto" onclick="closeDetail()">Close</button>`
    : `<button class="btn btn-ghost-dark" style="margin-left:auto" onclick="closeDetail()">Close</button>`;
  document.getElementById('detailModal').style.display = 'flex';
}
function closeDetail() { document.getElementById('detailModal').style.display = 'none'; activeDetailId = null; }
function deleteEvt() { if (!activeDetailId) return; events = events.filter(e => e.id !== activeDetailId); closeDetail(); renderCal(); }

function formatTime(t) {
  if (!t) return '';
  const [h,m] = t.split(':').map(Number);
  return (h%12||12) + ':' + String(m).padStart(2,'0') + ' ' + (h>=12?'PM':'AM');
}

function isDupe(name, date) {
  return events.some(e => e.name.toLowerCase().trim() === name.toLowerCase().trim() && e.date === date);
}

// ── EVENTBRITE ──
async function fetchEventbrite() {
  const startDate = new Date(curYear, curMonth, 1).toISOString().replace('.000','');
  const endDate   = new Date(curYear, curMonth+1, 0, 23, 59).toISOString().replace('.000','');
  const url = `https://www.eventbriteapi.com/v3/events/search/?location.address=Tulsa%2C%20OK&location.within=30mi&start_date.range_start=${startDate}&start_date.range_end=${endDate}&expand=venue&page_size=50&token=${EB_KEY}`;
  const res  = await fetch(CORS + encodeURIComponent(url));
  const data = await res.json();
  if (!data.events) return 0;
  let added = 0;
  data.events.forEach(ev => {
    const dt   = ev.start?.local || '';
    const date = dt.slice(0,10);
    const time = dt.slice(11,16);
    if (!date || isDupe(ev.name.text, date)) return;
    const loc = ev.venue ? (ev.venue.name || ev.venue.address?.localized_address_display || 'Tulsa, OK') : 'Tulsa, OK';
    events.push({ id: uid(), name: ev.name.text, date, time, cat: guessCategory(ev.name.text, ev.description?.text, null), loc, notes: ev.description?.text?.slice(0,300) || '', source: 'eventbrite', url: ev.url || '', attendance: ev.capacity || 0 });
    added++;
  });
  return added;
}

// ── TICKETMASTER ──
async function fetchTicketmaster() {
  const startDate = new Date(curYear, curMonth, 1).toISOString().slice(0,19) + 'Z';
  const endDate   = new Date(curYear, curMonth+1, 0, 23, 59).toISOString().slice(0,19) + 'Z';
  const url = `https://app.ticketmaster.com/discovery/v2/events.json?city=Tulsa&stateCode=OK&startDateTime=${startDate}&endDateTime=${endDate}&size=50&apikey=${TM_KEY}`;
  const res  = await fetch(CORS + encodeURIComponent(url));
  const data = await res.json();
  const evts = data._embedded?.events;
  if (!evts) return 0;
  let added = 0;
  evts.forEach(ev => {
    const date = ev.dates?.start?.localDate || '';
    const time = ev.dates?.start?.localTime?.slice(0,5) || '';
    if (!date || isDupe(ev.name, date)) return;
    const venue = ev._embedded?.venues?.[0];
    const loc   = venue ? venue.name + (venue.city?.name ? ', ' + venue.city.name : '') : 'Tulsa, OK';
    const seg   = ev.classifications?.[0]?.segment?.name || '';
    const att   = ev.sales?.public ? 5000 : 0;
    events.push({ id: uid(), name: ev.name, date, time, cat: guessCategory(ev.name, '', seg), loc, notes: '', source: 'ticketmaster', url: ev.url || '', attendance: att });
    added++;
  });
  return added;
}

// ── PREDICTHQ ──
async function fetchPredictHQ() {
  const startDate = new Date(curYear, curMonth, 1).toISOString().slice(0,10);
  const endDate   = new Date(curYear, curMonth+1, 0).toISOString().slice(0,10);
  const url = `https://api.predicthq.com/v1/events/?country=US&location_around.origin=36.1540,-95.9928&location_around.offset=30mi&start.gte=${startDate}&start.lte=${endDate}&limit=100&category=concerts,conferences,expos,festivals,performing-arts,sports,community,observances`;
  const res  = await fetch(CORS + encodeURIComponent(url), { headers: { 'Authorization': 'Bearer ' + PHQ_KEY, 'Accept': 'application/json' } });
  const data = await res.json();
  if (!data.results) return 0;
  let added = 0;
  data.results.forEach(ev => {
    const date = ev.start?.slice(0,10) || '';
    const time = ev.start?.slice(11,16) || '';
    if (!date || isDupe(ev.title, date)) return;
    const cat = guessCategory(ev.title, ev.description, ev.category);
    events.push({ id: uid(), name: ev.title, date, time, cat, loc: ev.entities?.find(e=>e.type==='venue')?.name || 'Tulsa, OK', notes: ev.description?.slice(0,300) || '', source: 'predicthq', url: '', attendance: ev.phq_attendance || ev.predicted_event_spend_industry ? Math.round(ev.phq_attendance||0) : 0 });
    added++;
  });
  return added;
}

// ── AI SEARCH FALLBACK ──
async function fetchAIEvents() {
  const prompt = `Search for upcoming events in Tulsa, Oklahoma in ${MONTHS[curMonth]} ${curYear} that would bring large crowds into the city. Focus on: conventions at Cox Convention Center, trade shows, consumer expos, college events (University of Tulsa, OSU-Tulsa), rodeos, air shows, state championship tournaments, major festivals, and any large community gatherings not typically listed on Ticketmaster or Eventbrite. Return ONLY a valid JSON array (no markdown, no preamble) of up to 15 events: [{"name":"...","date":"${curYear}-${String(curMonth+1).padStart(2,'0')}-DD","time":"HH:MM","cat":"arts|sports|conv|food|community","loc":"venue name","notes":"brief description","attendance":5000}]. Use realistic Tulsa venues. Only return the JSON array.`;

  const res  = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1500,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  const textBlock = data.content?.find(b => b.type === 'text');
  const raw = textBlock?.text || '';
  const match = raw.match(/\[[\s\S]*?\]/);
  if (!match) return 0;
  let parsed = [];
  try { parsed = JSON.parse(match[0]); } catch { return 0; }
  let added = 0;
  parsed.forEach(ev => {
    if (!ev.name || !ev.date || isDupe(ev.name, ev.date)) return;
    events.push({ id: uid(), name: ev.name, date: ev.date, time: ev.time || '', cat: ev.cat || 'community', loc: ev.loc || 'Tulsa, OK', notes: ev.notes || '', source: 'ai', url: '', attendance: ev.attendance || 0 });
    added++;
  });
  return added;
}

// ── FETCH ALL ──
async function fetchAllEvents() {
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.textContent = 'Fetching...';
  tallies = { eb: 0, tm: 0, phq: 0, ai: 0 };
  updateTallies();

  setStatus('Fetching Eventbrite events...', true);
  try { tallies.eb = await fetchEventbrite(); } catch(e) { console.error('EB:', e); }
  updateTallies();

  setStatus('Fetching Ticketmaster events...', true);
  try { tallies.tm = await fetchTicketmaster(); } catch(e) { console.error('TM:', e); }
  updateTallies();

  setStatus('Fetching PredictHQ events...', true);
  try { tallies.phq = await fetchPredictHQ(); } catch(e) { console.error('PHQ:', e); }
  updateTallies();

  setStatus('Running AI search for conventions & additional events...', true);
  try { tallies.ai = await fetchAIEvents(); } catch(e) { console.error('AI:', e); }
  updateTallies();

  renderCal();
  btn.disabled = false;
  btn.textContent = '↓ Fetch Events';
  const total = tallies.eb + tallies.tm + tallies.phq + tallies.ai;
  setStatus(total > 0 ? `Loaded ${total} events for ${MONTHS[curMonth]} ${curYear} — ${tallies.eb} Eventbrite · ${tallies.tm} Ticketmaster · ${tallies.phq} PredictHQ · ${tallies.ai} AI Search` : 'No new events found — try another month or add events manually.', false);
}

renderCal();
